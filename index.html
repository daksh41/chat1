<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>

  <!-- Zapier Chatbot Script -->
  <script async type="module" src="https://interfaces.zapier.com/assets/web-components/zapier-interfaces/zapier-interfaces.esm.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #1f1c2c, #928dab);
      color: white;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 50px;
      background: rgba(0,0,0,0.3);
    }

    header h1 {
      font-size: 24px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-size: 16px;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 30px;
      padding: 15px 30px;
      border: none;
      border-radius: 30px;
      background: #ff7a18;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff9a44;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 50px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      backdrop-filter: blur(10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

  <header>
    <h1>🤖 AI Chatbot</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Features</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Smart AI Assistant</h2>
    <p>Chat instantly with our AI-powered chatbot anytime, anywhere.</p>
    <button class="btn">Open Chat</button>
  </section>

  <section class="features">
    <div class="card">
      <h3>⚡ Fast</h3>
      <p>Instant replies with AI technology.</p>
    </div>
    <div class="card">
      <h3>🌍 24/7</h3>
      <p>Available anytime you need help.</p>
    </div>
    <div class="card">
      <h3>🔒 Secure</h3>
      <p>Your data is safe and protected.</p>
    </div>
  </section>

  <footer>
    <p>© 2026 AI Chatbot Website</p>
  </footer>

  <!-- Your Chatbot Embed -->
  <zapier-interfaces-chatbot-embed 
    is-popup="true" 
    chatbot-id="cmn02qdyj0027g15pne8ji1w2">
  </zapier-interfaces-chatbot-embed>

</body>
</html>
